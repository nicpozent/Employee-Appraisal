version: 2
updates:
  # npm dependencies (root + both workspaces are covered from the root manifest/lockfile)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps to keep noise low
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  # Keep the CI workflow's actions current
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: "ci"
